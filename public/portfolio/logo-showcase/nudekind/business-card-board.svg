    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#C88973" stroke-width="2" opacity=".28"/>
    <g transform="translate(635 185) scale(0.82)"><rect x="35" y="38" width="130" height="124" rx="62" fill="#A8B996"/><path d="M61 151V75h35c27 0 42 17 42 44v32" fill="none" stroke="#281A16" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/><path d="M61 76c26-26 61-28 90-5" fill="none" stroke="#C88973" stroke-width="13" stroke-linecap="round"/><path d="M141 52c-15-6-35-3-52 12" fill="none" stroke="#F8EEE9" stroke-width="7" stroke-linecap="round" opacity=".82"/></g>
    <text x="90" y="154" fill="#F8EEE9" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="850">Nudekind</text>
