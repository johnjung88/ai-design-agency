<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#281A16"/>
      <stop offset=".58" stop-color="#211714"/>
      <stop offset="1" stop-color="#281A16"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F8EEE9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C88973"/>
      <stop offset="1" stop-color="#A8B996"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#F8EEE9"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#texture)" opacity=".50"/>
  <g opacity=".36"><circle cx="1320" cy="130" r="230" fill="#A8B996"/><circle cx="230" cy="860" r="210" fill="#C88973"/></g>
  <text x="115" y="126" fill="#A8B996" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" letter-spacing="6">BUSINESS CARD SYSTEM</text>
  <text x="115" y="192" fill="#211714" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">Nudekind</text>
  <text x="115" y="238" fill="#211714" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
  <g transform="translate(380 300) rotate(-7)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="url(#paper)"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#A8B996" stroke-width="2" opacity=".6"/>
    <g transform="translate(150 155) scale(0.86)"><rect x="35" y="38" width="130" height="124" rx="62" fill="#A8B996"/><path d="M61 151V75h35c27 0 42 17 42 44v32" fill="none" stroke="#211714" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/><path d="M61 76c26-26 61-28 90-5" fill="none" stroke="#C88973" stroke-width="13" stroke-linecap="round"/><path d="M141 52c-15-6-35-3-52 12" fill="none" stroke="#FFF4E4" stroke-width="7" stroke-linecap="round" opacity=".82"/></g>
    <text x="345" y="246" text-anchor="start" fill="#211714" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">Nudekind</text>
  <text x="345" y="270.96" text-anchor="start" fill="#211714" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">CLEAN BEAUTY</text>
    <path d="M347 342h280" stroke="#C88973" stroke-width="3"/>
  </g>
  <g transform="translate(705 535) rotate(8)" filter="url(#shadow)">
