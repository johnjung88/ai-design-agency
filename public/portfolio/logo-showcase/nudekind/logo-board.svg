<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#281A16"/>
      <stop offset=".58" stop-color="#211714"/>
      <stop offset="1" stop-color="#281A16"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F8EEE9"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#C88973"/>
      <stop offset="1" stop-color="#A8B996"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#281A16"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#C88973"/><circle cx="1300" cy="790" r="300" stroke="#C88973"/><path d="M1010 155h440M1010 844h440" stroke="#C88973"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><rect x="35" y="38" width="130" height="124" rx="62" fill="#A8B996"/><path d="M61 151V75h35c27 0 42 17 42 44v32" fill="none" stroke="#211714" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/><path d="M61 76c26-26 61-28 90-5" fill="none" stroke="#C88973" stroke-width="13" stroke-linecap="round"/><path d="M141 52c-15-6-35-3-52 12" fill="none" stroke="#FFF4E4" stroke-width="7" stroke-linecap="round" opacity=".82"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#F8EEE9" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Nudekind</text>
  <text x="575" y="824" text-anchor="middle" fill="#C88973" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">CLEAN BEAUTY</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#C88973" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#F8EEE9" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">soft n + skin barrier</text>
    <text x="0" y="132" fill="#F8EEE9" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#F8EEE9" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#281A16" stroke="#C88973"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#A8B996"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#C88973"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#F8EEE9"/>
    <text x="0" y="358" fill="#F8EEE9" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
