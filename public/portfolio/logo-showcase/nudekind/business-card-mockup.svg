<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#3B2923" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#A7B797" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#C88B75" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8EFEA"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#A7B797" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3B2923"/>
      <stop offset=".65" stop-color="#211916"/>
      <stop offset="1" stop-color="#C88B75"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#F8EFEA" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#F8EFEA" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="url(#studioBg)"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".55"/>
  <ellipse cx="790" cy="860" rx="610" ry="76" fill="#000000" opacity=".11"/>
  <circle cx="1320" cy="174" r="214" fill="#C88B75" opacity=".1"/>
  <circle cx="250" cy="816" r="190" fill="#A7B797" opacity=".14"/>
  <text x="96" y="110" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#211916" opacity=".42">BUSINESS CARD MOCKUP</text>
  <text x="96" y="168" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="950" fill="#211916">Nudekind</text>
  <text x="98" y="214" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="750" fill="#211916" opacity=".55">Gentle beauty identity / foil, emboss, print-ready presentation</text>
  
  <g transform="rotate(8 1220 225)">
    <rect x="1030" y="95" width="380" height="250" rx="20" fill="#F8EFEA" filter="url(#contactShadow)"/>
    <rect x="1064" y="129" width="312" height="42" rx="21" fill="#3B2923"/>
    <g transform="translate(1074 201) scale(.44)"><g><rect x="18" y="20" width="64" height="60" rx="30" fill="#A7B797"/><path d="M31 73V35h17c13 0 21 8 21 22v16" fill="none" stroke="#211916" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36c13-13 30-14 44-2" fill="none" stroke="#C88B75" stroke-width="7" stroke-linecap="round"/><path d="M70 24c-7-3-16-2-24 5" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".9"/></g></g>
    <path d="M1148 223h178M1148 255h130M1148 287h158" stroke="#211916" stroke-width="8" stroke-linecap="round" opacity=".12"/>
  </g>
  
  <g transform="rotate(-8 655 562.5)">
    <rect x="300" y="360" width="710" height="405" rx="22" fill="url(#cardSheen)" filter="url(#ambientShadow)"/>
    <rect x="300" y="360" width="710" height="405" rx="22" fill="#ffffff" opacity=".22"/>
    <rect x="324" y="384" width="662" height="357" rx="14" fill="none" stroke="#211916" stroke-width="1.3" opacity=".1"/>
    <g transform="translate(346 418) scale(.62)"><g><rect x="18" y="20" width="64" height="60" rx="30" fill="#A7B797"/><path d="M31 73V35h17c13 0 21 8 21 22v16" fill="none" stroke="#211916" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36c13-13 30-14 44-2" fill="none" stroke="#C88B75" stroke-width="7" stroke-linecap="round"/><path d="M70 24c-7-3-16-2-24 5" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".9"/></g></g>
    
  <text x="440" y="468" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="950" fill="#211916">Nudekind</text>
  <text x="440" y="482.88" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#211916" opacity=".48">GENTLE BEAUTY IDENTITY</text>
    <text x="346" y="690" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="3" fill="#211916" opacity=".42">BRAND IDENTITY</text>
    <path d="M346 717h618" stroke="#211916" stroke-width="1.5" opacity=".12"/>
    <text x="964" y="689" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#211916" opacity=".74">Clean Cosmetics</text>
    <circle cx="942" cy="424" r="26" fill="#A7B797" opacity=".22"/>
  </g>
  
  <g transform="rotate(9 985 400)">
    <rect x="640" y="205" width="690" height="390" rx="22" fill="#3B2923" filter="url(#ambientShadow)"/>
    <rect x="640" y="205" width="690" height="390" rx="22" fill="#ffffff" opacity=".04"/>
    <rect x="664" y="229" width="642" height="342" rx="14" fill="none" stroke="#ffffff" stroke-width="1.3" opacity=".1"/>
    <g transform="translate(686 263) scale(.62)"><g><rect x="18" y="20" width="64" height="60" rx="30" fill="#A7B797"/><path d="M31 73V35h17c13 0 21 8 21 22v16" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36c13-13 30-14 44-2" fill="none" stroke="#C88B75" stroke-width="7" stroke-linecap="round"/><path d="M70 24c-7-3-16-2-24 5" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".9"/></g></g>
    
  <text x="780" y="313" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="950" fill="#ffffff">Nudekind</text>
  <text x="780" y="327.88" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#ffffff" opacity=".48">GENTLE BEAUTY IDENTITY</text>
    <text x="686" y="520" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="3" fill="#ffffff" opacity=".42">BRAND IDENTITY</text>
    <path d="M686 547h598" stroke="#ffffff" stroke-width="1.5" opacity=".12"/>
    <text x="1284" y="519" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff" opacity=".74">Clean Cosmetics</text>
    <circle cx="1262" cy="269" r="26" fill="#A7B797" opacity=".38"/>
  </g>
  <g transform="rotate(-8 650 540)">
    <rect x="804" y="602" width="142" height="34" rx="17" fill="#C88B75" opacity=".92"/>
    <rect x="960" y="602" width="80" height="34" rx="17" fill="#A7B797" opacity=".92"/>
  </g>
  <text x="1140" y="870" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="4" fill="#211916" opacity=".44">PRINT APPLICATION</text>
</svg>
