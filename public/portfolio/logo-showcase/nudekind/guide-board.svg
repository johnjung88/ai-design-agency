  <g transform="translate(985 448) scale(.45)"><g><rect x="18" y="20" width="64" height="60" rx="30" fill="#A7B797"/><path d="M31 73V35h17c13 0 21 8 21 22v16" fill="none" stroke="#211916" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36c13-13 30-14 44-2" fill="none" stroke="#C88B75" stroke-width="7" stroke-linecap="round"/><path d="M70 24c-7-3-16-2-24 5" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".9"/></g></g>
  <path d="M570 620h548" stroke="#211916" stroke-width="2" opacity=".12"/>
  <text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#211916" opacity=".45">SCALE TEST</text>
  <rect x="1190" y="380" width="120" height="120" rx="26" fill="#C88B75"/>
  <rect x="1340" y="380" width="120" height="120" rx="26" fill="#A7B797"/>
  <rect x="1190" y="535" width="120" height="120" rx="26" fill="#211916"/>
  <rect x="1340" y="535" width="120" height="120" rx="26" fill="#F8EFEA" stroke="#211916" stroke-width="2" opacity=".9"/>
  <text x="1190" y="710" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#211916" opacity=".45">PALETTE</text>
