<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10132F"/>
      <stop offset=".58" stop-color="#11142A"/>
      <stop offset="1" stop-color="#10132F"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#ECECFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#665CFF"/>
      <stop offset="1" stop-color="#12C8E8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#10132F"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#665CFF"/><circle cx="1300" cy="790" r="300" stroke="#665CFF"/><path d="M1010 155h440M1010 844h440" stroke="#665CFF"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><path d="M100 27v146M27 100h146M54 54l92 92M146 54l-92 92" stroke="#12C8E8" stroke-width="10" stroke-linecap="round"/><circle cx="100" cy="100" r="31" fill="#665CFF"/><circle cx="100" cy="27" r="13" fill="#11142A"/><circle cx="173" cy="100" r="13" fill="#11142A"/><circle cx="100" cy="173" r="13" fill="#11142A"/><circle cx="27" cy="100" r="13" fill="#11142A"/><circle cx="100" cy="100" r="9" fill="#FFF4E4"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#ECECFF" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Nova Node</text>
  <text x="575" y="824" text-anchor="middle" fill="#665CFF" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">DATA INTELLIGENCE</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#665CFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#ECECFF" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">node network + nova pulse</text>
    <text x="0" y="132" fill="#ECECFF" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#ECECFF" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#10132F" stroke="#665CFF"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#12C8E8"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#665CFF"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#ECECFF"/>
    <text x="0" y="358" fill="#ECECFF" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
