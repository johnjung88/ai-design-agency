  <text x="115" y="192" fill="#21140F" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">MORU Coffee</text>
  <text x="115" y="238" fill="#21140F" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
