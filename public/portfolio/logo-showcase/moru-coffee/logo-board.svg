  <g transform="translate(1158 688) scale(1)"><g><circle cx="50" cy="50" r="42" fill="#ffffff"/><path d="M28 52c6-28 39-36 48-8 7 23-16 43-36 30-9-6-14-14-12-22Z" fill="#ffffff"/><path d="M42 27c16 16 17 41-3 56" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round"/><path d="M26 58h48" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity=".92"/><path d="M36 39c9-7 18-7 27 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".9"/></g></g>
  <g transform="translate(1326 688) scale(1)"><g><circle cx="50" cy="50" r="42" fill="#ffffff"/><path d="M28 52c6-28 39-36 48-8 7 23-16 43-36 30-9-6-14-14-12-22Z" fill="#ffffff"/><path d="M42 27c16 16 17 41-3 56" fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round"/><path d="M26 58h48" stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity=".92"/><path d="M36 39c9-7 18-7 27 0" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".9"/></g></g>
  <text x="972" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#211712" opacity=".46">PRIMARY</text>
  <text x="1140" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#211712" opacity=".46">ACCENT</text>
  <text x="1308" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#211712" opacity=".46">MONO</text>
