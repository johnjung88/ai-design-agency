  <text x="575" y="754" text-anchor="middle" fill="#FFF4E4" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">MORU Coffee</text>
  <text x="575" y="824" text-anchor="middle" fill="#C9954A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">SMALL BATCH ROASTERY</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#C9954A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#FFF4E4" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">M + bean + cup silhouette</text>
    <text x="0" y="132" fill="#FFF4E4" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#FFF4E4" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
