  <path d="M150 360h260v260H150Z" fill="none" stroke="#7A4E2E" stroke-width="3" stroke-dasharray="10 12" opacity=".45"/>
  <path d="M180 390h200v200H180Z" fill="none" stroke="#211712" stroke-width="2" opacity=".12"/>
  <text x="150" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#211712" opacity=".45">CLEARSPACE</text>
