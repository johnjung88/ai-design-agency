  <path d="M570 620h548" stroke="#211712" stroke-width="2" opacity=".12"/>
  <text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#211712" opacity=".45">SCALE TEST</text>
  <rect x="1190" y="380" width="120" height="120" rx="26" fill="#7A4E2E"/>
  <rect x="1340" y="380" width="120" height="120" rx="26" fill="#C99B6A"/>
  <rect x="1190" y="535" width="120" height="120" rx="26" fill="#211712"/>
