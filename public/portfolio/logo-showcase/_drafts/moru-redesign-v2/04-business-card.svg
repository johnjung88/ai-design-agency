<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200" role="img">
  
  <defs>
    <filter id="shadowLg" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="32" stdDeviation="30" flood-color="#160a06" flood-opacity=".18"/>
    </filter>
    <filter id="shadowMd" x="-25%" y="-25%" width="150%" height="155%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#160a06" flood-opacity=".18"/>
    </filter>
    <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .032"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="paperWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset=".64" stop-color="#f7efe3"/>
      <stop offset="1" stop-color="#ead3b7"/>
    </linearGradient>
    <linearGradient id="roastDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24140e"/>
      <stop offset=".62" stop-color="#4d2d21"/>
      <stop offset="1" stop-color="#9b6644"/>
    </linearGradient>
    <linearGradient id="cardLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".58" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#f7efe3"/>
    </linearGradient>
  </defs>
  
  
  <rect width="1800" height="1200" fill="#24140e"/>
  <rect x="54" y="54" width="1692" height="1092" rx="44" fill="url(#paperWarm)"/>
  <rect x="54" y="54" width="1692" height="1092" rx="44" fill="#ffffff" filter="url(#paperGrain)" opacity=".44"/>
  
  <text x="112" y="122" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="7" fill="#9b6644">04  BUSINESS CARD</text>
  <text x="112" y="206" font-family="Inter, Arial, sans-serif" font-size="70" font-weight="950" letter-spacing="-1" fill="#17110d">Front and Back</text>
  <text x="114" y="258" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="720" fill="#7c7066">A simple card system that works for founders, cafes, salons, and local stores.</text>
  <g transform="translate(150 386)" filter="url(#shadowLg)">
    <rect x="0" y="0" width="690" height="410" rx="28" fill="url(#cardLight)" transform="rotate(-4 345 205)"/>
    
  <g transform="translate(110 134) scale(0.72)">
    <circle cx="100" cy="100" r="88" fill="#fffaf2"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#9b6644" stroke-width="7"/>
    <path d="M53 122V76c0-23 28-32 42-13l5 7 5-7c14-19 42-10 42 13v46" fill="none" stroke="#24140e" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M54 122c28-17 64-17 92 0" fill="none" stroke="#9b6644" stroke-width="10" stroke-linecap="round"/>
    <circle cx="100" cy="91" r="7" fill="#9b6644"/>
  </g>
    <text x="244" y="194" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="950" fill="#17110d" transform="rotate(-4 244 194)">MORU Coffee</text>
    <text x="244" y="234" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="6" fill="#17110d" opacity=".45" transform="rotate(-4 244 234)">SMALL BATCH ROASTERY</text>
    <rect x="780" y="56" width="690" height="410" rx="28" fill="#24140e" transform="rotate(3 1125 261)"/>
    <text x="890" y="178" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="950" fill="#fffaf2" transform="rotate(3 890 178)">Brand Manager</text>
    <text x="890" y="226" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="720" fill="#f7efe3" opacity=".72" transform="rotate(3 890 226)">name@moru.coffee  /  010 0000 0000</text>
    <text x="890" y="268" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="720" fill="#f7efe3" opacity=".72" transform="rotate(3 890 268)">Seoul, Korea  /  @moru.roastery</text>
    
  <g transform="translate(1272 316) scale(0.62)">
    <circle cx="100" cy="100" r="88" fill="url(#roastDark)"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#c99a67" stroke-width="7"/>
    <path d="M53 122V76c0-23 28-32 42-13l5 7 5-7c14-19 42-10 42 13v46" fill="none" stroke="#fffaf2" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M54 122c28-17 64-17 92 0" fill="none" stroke="#c99a67" stroke-width="10" stroke-linecap="round"/>
