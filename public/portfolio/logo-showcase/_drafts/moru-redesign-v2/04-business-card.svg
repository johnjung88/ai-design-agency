  <text x="150" y="974" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="850" letter-spacing="5" fill="#7c7066">FRONT LOGO SIDE / BACK CONTACT SIDE / PRINT-READY LAYOUT</text>
