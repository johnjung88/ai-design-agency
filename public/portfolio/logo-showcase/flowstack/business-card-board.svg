<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#121A2B"/>
      <stop offset=".58" stop-color="#101827"/>
      <stop offset="1" stop-color="#121A2B"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#EAF1FF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#EAF1FF"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#texture)" opacity=".50"/>
  <g opacity=".36"><circle cx="1320" cy="130" r="230" fill="#22C55E"/><circle cx="230" cy="860" r="210" fill="#2563EB"/></g>
  <text x="115" y="126" fill="#22C55E" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" letter-spacing="6">BUSINESS CARD SYSTEM</text>
  <text x="115" y="192" fill="#101827" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">Flowstack</text>
  <text x="115" y="238" fill="#101827" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
  <g transform="translate(380 300) rotate(-7)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="url(#paper)"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#22C55E" stroke-width="2" opacity=".6"/>
    <g transform="translate(150 155) scale(0.86)"><rect x="32" y="44" width="95" height="34" rx="11" fill="#2563EB"/><rect x="53" y="84" width="95" height="34" rx="11" fill="#22C55E"/><rect x="74" y="124" width="95" height="34" rx="11" fill="#2563EB"/><path d="M128 58 166 100 128 142" fill="none" stroke="#101827" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 62h61M71 102h61M92 142h61" stroke="#FFF4E4" stroke-width="6" stroke-linecap="round" opacity=".65"/></g>
    <text x="345" y="246" text-anchor="start" fill="#101827" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">Flowstack</text>
  <text x="345" y="270.96" text-anchor="start" fill="#101827" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">AUTOMATION SYSTEM</text>
    <path d="M347 342h280" stroke="#2563EB" stroke-width="3"/>
  </g>
  <g transform="translate(705 535) rotate(8)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="#121A2B"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#2563EB" stroke-width="2" opacity=".28"/>
    <g transform="translate(635 185) scale(0.82)"><rect x="32" y="44" width="95" height="34" rx="11" fill="#2563EB"/><rect x="53" y="84" width="95" height="34" rx="11" fill="#22C55E"/><rect x="74" y="124" width="95" height="34" rx="11" fill="#2563EB"/><path d="M128 58 166 100 128 142" fill="none" stroke="#121A2B" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 62h61M71 102h61M92 142h61" stroke="#EAF1FF" stroke-width="6" stroke-linecap="round" opacity=".65"/></g>
    <text x="90" y="154" fill="#EAF1FF" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="850">Flowstack</text>
    <text x="92" y="202" fill="#2563EB" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" letter-spacing="5">AUTOMATION SYSTEM</text>
    <path d="M92 292h278" stroke="#22C55E" stroke-width="2" opacity=".56"/>
    <text x="92" y="342" fill="#EAF1FF" opacity=".62" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="540">flowstack.kr</text>
    <text x="92" y="380" fill="#EAF1FF" opacity=".62" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="540">@flowstack</text>
  </g>
</svg>
