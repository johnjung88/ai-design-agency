<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#263238" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#20B8AB" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#F05A2A" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1E8"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#20B8AB" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263238"/>
      <stop offset=".65" stop-color="#1A1D1F"/>
      <stop offset="1" stop-color="#F05A2A"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#FFF1E8" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#FFF1E8" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="#FFF1E8"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".48"/>
  <rect x="78" y="72" width="1444" height="856" rx="38" fill="#ffffff" filter="url(#ambientShadow)"/>
  <text x="132" y="150" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#F05A2A">FITNESS ROUTINE</text>
  
  <g transform="translate(175 265) scale(2.75)" filter="url(#pressedInk)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#F05A2A"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#20B8AB" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#1A1D1F" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
  
  <text x="518.75" y="424.5" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="950" fill="#1A1D1F">HaruFit</text>
  <text x="518.75" y="464.82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="4" fill="#1A1D1F" opacity=".48">DAILY ROUTINE IDENTITY</text>
  <path d="M132 604h1336" stroke="#1A1D1F" stroke-width="2" opacity=".1"/>
  <text x="132" y="692" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="950" fill="#1A1D1F">Identity system</text>
  <text x="132" y="742" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#1A1D1F" opacity=".62">Daily routine identity with primary, mono, reverse, and small-size usage.</text>
  <rect x="972" y="670" width="136" height="136" rx="30" fill="#F05A2A"/>
  <rect x="1140" y="670" width="136" height="136" rx="30" fill="#20B8AB"/>
  <rect x="1308" y="670" width="136" height="136" rx="30" fill="#1A1D1F"/>
  <g transform="translate(990 688) scale(1)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#ffffff"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
  <g transform="translate(1158 688) scale(1)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#ffffff"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
  <g transform="translate(1326 688) scale(1)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#ffffff"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
  <text x="972" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1A1D1F" opacity=".46">PRIMARY</text>
  <text x="1140" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1A1D1F" opacity=".46">ACCENT</text>
  <text x="1308" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1A1D1F" opacity=".46">MONO</text>
</svg>
