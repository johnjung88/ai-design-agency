<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20272A"/>
      <stop offset=".58" stop-color="#171B1D"/>
      <stop offset="1" stop-color="#20272A"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#FFF1E8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F05A2A"/>
      <stop offset="1" stop-color="#20B8AB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#20272A"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#F05A2A"/><circle cx="1300" cy="790" r="300" stroke="#F05A2A"/><path d="M1010 155h440M1010 844h440" stroke="#F05A2A"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><rect x="34" y="34" width="132" height="132" rx="42" fill="#F05A2A"/><path d="M64 112 89 137 142 66" fill="none" stroke="#FFF4E4" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/><path d="M62 72h36m30 0h14M98 72v50" stroke="#20B8AB" stroke-width="12" stroke-linecap="round"/><path d="M57 155h88" stroke="#171B1D" stroke-width="7" stroke-linecap="round" opacity=".35"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#FFF1E8" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">HaruFit</text>
  <text x="575" y="824" text-anchor="middle" fill="#F05A2A" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">FITNESS ROUTINE</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#F05A2A" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#FFF1E8" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">H + check + progress</text>
    <text x="0" y="132" fill="#FFF1E8" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#FFF1E8" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#20272A" stroke="#F05A2A"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#20B8AB"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#F05A2A"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#FFF1E8"/>
    <text x="0" y="358" fill="#FFF1E8" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
