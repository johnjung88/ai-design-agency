  <text x="425" y="690" text-anchor="middle" fill="#ffffff" font-family="Inter, Montserrat, Arial, sans-serif" font-size="46" font-weight="860" letter-spacing="-1">HaruFit</text>
  <text x="425" y="712.08" text-anchor="middle" fill="#ffffff" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">FITNESS ROUTINE</text>
  <text x="425" y="815" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="5" fill="#ffffff" opacity=".42">DARK BACKGROUND</text>
