<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#263238" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#20B8AB" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#F05A2A" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF1E8"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#20B8AB" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263238"/>
      <stop offset=".65" stop-color="#1A1D1F"/>
      <stop offset="1" stop-color="#F05A2A"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#FFF1E8" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#FFF1E8" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="900" fill="#263238"/>
  <rect x="42" y="42" width="1516" height="816" rx="40" fill="url(#studioBg)"/>
  <rect x="42" y="42" width="1516" height="816" rx="40" fill="#ffffff" filter="url(#paperNoise)" opacity=".42"/>
  <text x="110" y="128" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#1A1D1F" opacity=".42">FITNESS ROUTINE</text>
  
  <g transform="translate(112 242) scale(1.8)" filter="url(#pressedInk)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#F05A2A"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#20B8AB" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#1A1D1F" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
  
  <text x="337" y="346.4" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="66" font-weight="950" fill="#1A1D1F">HaruFit</text>
  <text x="337" y="378.08" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="850" letter-spacing="4" fill="#1A1D1F" opacity=".48">DAILY ROUTINE IDENTITY</text>
  <text x="116" y="515" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="850" fill="#F05A2A">Daily routine identity</text>
  <text x="116" y="570" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#1A1D1F" opacity=".58">logo system / mono version / brand guide</text>
  <rect x="112" y="648" width="86" height="42" rx="21" fill="#F05A2A"/>
  <rect x="214" y="648" width="86" height="42" rx="21" fill="#20B8AB"/>
  <rect x="316" y="648" width="86" height="42" rx="21" fill="#1A1D1F"/>
  <g transform="translate(875 142) scale(.72)">
    <rect x="120" y="70" width="650" height="300" rx="8" fill="url(#darkPanel)" filter="url(#ambientShadow)"/>
    <g transform="translate(250 142) scale(.72)" filter="url(#neonGlow)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#F05A2A"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#20B8AB" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
    
  <text x="360" y="202" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="950" fill="#ffffff">HaruFit</text>
  <text x="360" y="221.2" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#ffffff" opacity=".48">DAILY ROUTINE IDENTITY</text>
    <rect x="150" y="418" width="520" height="288" rx="22" fill="url(#cardSheen)" filter="url(#ambientShadow)" transform="rotate(-8 410 562)"/>
    <g transform="translate(210 495) rotate(-8) scale(.58)"><g><rect x="17" y="17" width="66" height="66" rx="21" fill="#F05A2A"/><path d="M32 56 45 69 71 33" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><path d="M31 36h18m15 0h7M49 36v25" stroke="#20B8AB" stroke-width="6" stroke-linecap="round"/><path d="M28 78h45" stroke="#1A1D1F" stroke-width="4" stroke-linecap="round" opacity=".35"/></g></g>
    <text x="314" y="544" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="950" fill="#1A1D1F" transform="rotate(-8 314 544)">HaruFit</text>
  </g>
</svg>
