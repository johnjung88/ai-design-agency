<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#102B29"/>
      <stop offset=".58" stop-color="#102322"/>
      <stop offset="1" stop-color="#102B29"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#EAF4F1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#247B78"/>
      <stop offset="1" stop-color="#83AD74"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#102B29"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#247B78"/><circle cx="1300" cy="790" r="300" stroke="#247B78"/><path d="M1010 155h440M1010 844h440" stroke="#247B78"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><path d="M38 156V46l62 61 62-61v110" fill="none" stroke="#247B78" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><path d="M100 76v80M76 100h48" stroke="#102322" stroke-width="12" stroke-linecap="round"/><path d="M100 156c-21-20-37-27-58-22M100 156c21-20 37-27 58-22" stroke="#83AD74" stroke-width="10" stroke-linecap="round"/><circle cx="100" cy="100" r="48" fill="none" stroke="#FFF4E4" stroke-width="6" opacity=".55"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#EAF4F1" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">MediRoot</text>
  <text x="575" y="824" text-anchor="middle" fill="#247B78" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">WELLNESS CLINIC</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#247B78" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#EAF4F1" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">M + cross + root line</text>
    <text x="0" y="132" fill="#EAF4F1" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#EAF4F1" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#102B29" stroke="#247B78"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#83AD74"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#247B78"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#EAF4F1"/>
    <text x="0" y="358" fill="#EAF4F1" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
