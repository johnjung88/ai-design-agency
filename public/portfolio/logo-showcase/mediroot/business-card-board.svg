    <text x="345" y="246" text-anchor="start" fill="#102322" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">MediRoot</text>
  <text x="345" y="270.96" text-anchor="start" fill="#102322" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">WELLNESS CLINIC</text>
    <path d="M347 342h280" stroke="#247B78" stroke-width="3"/>
