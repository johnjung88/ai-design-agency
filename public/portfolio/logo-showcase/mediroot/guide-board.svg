<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#173936" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#7EAD73" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#247B78" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EAF4F1"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#7EAD73" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#173936"/>
      <stop offset=".65" stop-color="#102322"/>
      <stop offset="1" stop-color="#247B78"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#EAF4F1" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#EAF4F1" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="#EAF4F1"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".42"/>
  <rect x="78" y="72" width="1444" height="856" rx="38" fill="#ffffff" filter="url(#ambientShadow)"/>
  <text x="132" y="150" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#247B78">BRAND GUIDE</text>
  <text x="132" y="220" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="950" fill="#102322">MediRoot</text>
  <text x="132" y="268" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="750" fill="#102322" opacity=".58">Recovery clinic identity / clearspace, scale, and palette rules</text>
  <g transform="translate(180 390) scale(1.8)"><g><path d="M18 78V23l32 31 32-31v55" fill="none" stroke="#247B78" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 37v40M38 50h24" stroke="#102322" stroke-width="6.5" stroke-linecap="round"/><path d="M50 78c-10-10-18-13-29-11M50 78c10-10 18-13 29-11" stroke="#7EAD73" stroke-width="5.5" stroke-linecap="round"/><circle cx="50" cy="50" r="24" fill="none" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <path d="M150 360h260v260H150Z" fill="none" stroke="#247B78" stroke-width="3" stroke-dasharray="10 12" opacity=".45"/>
  <path d="M180 390h200v200H180Z" fill="none" stroke="#102322" stroke-width="2" opacity=".12"/>
  <text x="150" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#102322" opacity=".45">CLEARSPACE</text>
  <g transform="translate(590 392) scale(1.1)"><g><path d="M18 78V23l32 31 32-31v55" fill="none" stroke="#247B78" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 37v40M38 50h24" stroke="#102322" stroke-width="6.5" stroke-linecap="round"/><path d="M50 78c-10-10-18-13-29-11M50 78c10-10 18-13 29-11" stroke="#7EAD73" stroke-width="5.5" stroke-linecap="round"/><circle cx="50" cy="50" r="24" fill="none" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <g transform="translate(815 420) scale(.72)"><g><path d="M18 78V23l32 31 32-31v55" fill="none" stroke="#247B78" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 37v40M38 50h24" stroke="#102322" stroke-width="6.5" stroke-linecap="round"/><path d="M50 78c-10-10-18-13-29-11M50 78c10-10 18-13 29-11" stroke="#7EAD73" stroke-width="5.5" stroke-linecap="round"/><circle cx="50" cy="50" r="24" fill="none" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <g transform="translate(985 448) scale(.45)"><g><path d="M18 78V23l32 31 32-31v55" fill="none" stroke="#247B78" stroke-width="8.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 37v40M38 50h24" stroke="#102322" stroke-width="6.5" stroke-linecap="round"/><path d="M50 78c-10-10-18-13-29-11M50 78c10-10 18-13 29-11" stroke="#7EAD73" stroke-width="5.5" stroke-linecap="round"/><circle cx="50" cy="50" r="24" fill="none" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <path d="M570 620h548" stroke="#102322" stroke-width="2" opacity=".12"/>
  <text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#102322" opacity=".45">SCALE TEST</text>
  <rect x="1190" y="380" width="120" height="120" rx="26" fill="#247B78"/>
  <rect x="1340" y="380" width="120" height="120" rx="26" fill="#7EAD73"/>
  <rect x="1190" y="535" width="120" height="120" rx="26" fill="#102322"/>
  <rect x="1340" y="535" width="120" height="120" rx="26" fill="#EAF4F1" stroke="#102322" stroke-width="2" opacity=".9"/>
  <text x="1190" y="710" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#102322" opacity=".45">PALETTE</text>
</svg>
