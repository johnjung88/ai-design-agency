  <text x="132" y="220" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="950" fill="#102322">MediRoot</text>
  <text x="132" y="268" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="750" fill="#102322" opacity=".58">M + cross + root line / clearspace, scale, and palette rules</text>
