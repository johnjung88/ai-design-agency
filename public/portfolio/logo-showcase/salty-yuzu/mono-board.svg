<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#4A3210" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#1AAE89" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#F2A900" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF4D4"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#1AAE89" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A3210"/>
      <stop offset=".65" stop-color="#1F1A10"/>
      <stop offset="1" stop-color="#F2A900"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#FFF4D4" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#FFF4D4" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="#f4f2ee"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".38"/>
  <rect x="82" y="92" width="686" height="816" rx="36" fill="#4A3210" filter="url(#ambientShadow)"/>
  <rect x="832" y="92" width="686" height="816" rx="36" fill="#ffffff" filter="url(#ambientShadow)"/>
  <text x="132" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#ffffff" opacity=".48">REVERSE</text>
  <g transform="translate(255 272) scale(2.45)"><g><circle cx="46" cy="51" r="36" fill="#ffffff"/><circle cx="46" cy="51" r="24" fill="none" stroke="#ffffff" stroke-width="5"/><path d="M46 27v48M22 51h48M29 34l34 34M63 34 29 68" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/><circle cx="46" cy="51" r="8" fill="#ffffff"/><path d="M76 20l6 12 13 3-10 9 2 14-12-7-12 7 2-14-10-9 13-3Z" fill="#ffffff" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/></g></g>
  
  <text x="425" y="676" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="950" fill="#ffffff">Salty Yuzu</text>
  <text x="425" y="699.04" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#ffffff" opacity=".48">CITRUS DESSERT IDENTITY</text>
  <text x="425" y="780" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="5" fill="#ffffff" opacity=".42">DARK BACKGROUND</text>
  <text x="882" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#1F1A10" opacity=".42">MONO</text>
  <g transform="translate(1005 272) scale(2.45)"><g><circle cx="46" cy="51" r="36" fill="#1F1A10"/><circle cx="46" cy="51" r="24" fill="none" stroke="#1F1A10" stroke-width="5"/><path d="M46 27v48M22 51h48M29 34l34 34M63 34 29 68" stroke="#1F1A10" stroke-width="4" stroke-linecap="round"/><circle cx="46" cy="51" r="8" fill="#FFF4D4"/><path d="M76 20l6 12 13 3-10 9 2 14-12-7-12 7 2-14-10-9 13-3Z" fill="#1F1A10" stroke="#1F1A10" stroke-width="3" stroke-linejoin="round"/></g></g>
  
  <text x="1175" y="676" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="950" fill="#1F1A10">Salty Yuzu</text>
  <text x="1175" y="699.04" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#1F1A10" opacity=".48">CITRUS DESSERT IDENTITY</text>
  <text x="1175" y="780" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="5" fill="#1F1A10" opacity=".42">ONE-COLOR VERSION</text>
</svg>
