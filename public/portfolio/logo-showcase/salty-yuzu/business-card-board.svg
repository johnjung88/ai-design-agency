<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B210B"/>
      <stop offset=".58" stop-color="#20190D"/>
      <stop offset="1" stop-color="#2B210B"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#FFF3CE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2A900"/>
      <stop offset="1" stop-color="#20A887"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#FFF3CE"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#texture)" opacity=".50"/>
  <g opacity=".36"><circle cx="1320" cy="130" r="230" fill="#20A887"/><circle cx="230" cy="860" r="210" fill="#F2A900"/></g>
  <text x="115" y="126" fill="#20A887" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" letter-spacing="6">BUSINESS CARD SYSTEM</text>
  <text x="115" y="192" fill="#20190D" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">Salty Yuzu</text>
  <text x="115" y="238" fill="#20190D" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
  <g transform="translate(380 300) rotate(-7)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="url(#paper)"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#20A887" stroke-width="2" opacity=".6"/>
    <g transform="translate(150 155) scale(0.86)"><circle cx="93" cy="104" r="62" fill="#F2A900"/><circle cx="93" cy="104" r="45" fill="none" stroke="#20190D" stroke-width="7"/><path d="M93 58v92M47 104h92M61 72l65 65M126 72l-65 65" stroke="#20190D" stroke-width="5" stroke-linecap="round"/><circle cx="93" cy="104" r="13" fill="#FFF4E4"/><path d="M148 35l9 22 24 4-18 16 4 24-21-12-21 12 4-24-18-16 24-4Z" fill="#20A887" stroke="#20190D" stroke-width="5" stroke-linejoin="round"/></g>
    <text x="345" y="246" text-anchor="start" fill="#20190D" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">Salty Yuzu</text>
  <text x="345" y="270.96" text-anchor="start" fill="#20190D" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">YUZU SALT DESSERT</text>
    <path d="M347 342h280" stroke="#F2A900" stroke-width="3"/>
  </g>
