<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#4A3210" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#1AAE89" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#F2A900" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF4D4"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#1AAE89" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A3210"/>
      <stop offset=".65" stop-color="#1F1A10"/>
      <stop offset="1" stop-color="#F2A900"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#FFF4D4" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#FFF4D4" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="#FFF4D4"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".48"/>
  <rect x="78" y="72" width="1444" height="856" rx="38" fill="#ffffff" filter="url(#ambientShadow)"/>
  <text x="132" y="150" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#F2A900">F&amp;B DESSERT</text>
  
  <g transform="translate(175 265) scale(2.75)" filter="url(#pressedInk)"><g><circle cx="46" cy="51" r="36" fill="#F2A900"/><circle cx="46" cy="51" r="24" fill="none" stroke="#1F1A10" stroke-width="5"/><path d="M46 27v48M22 51h48M29 34l34 34M63 34 29 68" stroke="#1F1A10" stroke-width="4" stroke-linecap="round"/><circle cx="46" cy="51" r="8" fill="#ffffff"/><path d="M76 20l6 12 13 3-10 9 2 14-12-7-12 7 2-14-10-9 13-3Z" fill="#1AAE89" stroke="#1F1A10" stroke-width="3" stroke-linejoin="round"/></g></g>
  
  <text x="518.75" y="424.5" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="84" font-weight="950" fill="#1F1A10">Salty Yuzu</text>
  <text x="518.75" y="464.82" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="4" fill="#1F1A10" opacity=".48">CITRUS DESSERT IDENTITY</text>
  <path d="M132 604h1336" stroke="#1F1A10" stroke-width="2" opacity=".1"/>
  <text x="132" y="692" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="950" fill="#1F1A10">Identity system</text>
  <text x="132" y="742" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" fill="#1F1A10" opacity=".62">Citrus dessert identity with primary, mono, reverse, and small-size usage.</text>
  <rect x="972" y="670" width="136" height="136" rx="30" fill="#F2A900"/>
  <rect x="1140" y="670" width="136" height="136" rx="30" fill="#1AAE89"/>
  <rect x="1308" y="670" width="136" height="136" rx="30" fill="#1F1A10"/>
  <g transform="translate(990 688) scale(1)"><g><circle cx="46" cy="51" r="36" fill="#ffffff"/><circle cx="46" cy="51" r="24" fill="none" stroke="#ffffff" stroke-width="5"/><path d="M46 27v48M22 51h48M29 34l34 34M63 34 29 68" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/><circle cx="46" cy="51" r="8" fill="#ffffff"/><path d="M76 20l6 12 13 3-10 9 2 14-12-7-12 7 2-14-10-9 13-3Z" fill="#ffffff" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/></g></g>
  <g transform="translate(1158 688) scale(1)"><g><circle cx="46" cy="51" r="36" fill="#ffffff"/><circle cx="46" cy="51" r="24" fill="none" stroke="#ffffff" stroke-width="5"/><path d="M46 27v48M22 51h48M29 34l34 34M63 34 29 68" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/><circle cx="46" cy="51" r="8" fill="#ffffff"/><path d="M76 20l6 12 13 3-10 9 2 14-12-7-12 7 2-14-10-9 13-3Z" fill="#ffffff" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/></g></g>
  <g transform="translate(1326 688) scale(1)"><g><circle cx="46" cy="51" r="36" fill="#ffffff"/><circle cx="46" cy="51" r="24" fill="none" stroke="#ffffff" stroke-width="5"/><path d="M46 27v48M22 51h48M29 34l34 34M63 34 29 68" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/><circle cx="46" cy="51" r="8" fill="#ffffff"/><path d="M76 20l6 12 13 3-10 9 2 14-12-7-12 7 2-14-10-9 13-3Z" fill="#ffffff" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/></g></g>
  <text x="972" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1F1A10" opacity=".46">PRIMARY</text>
  <text x="1140" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1F1A10" opacity=".46">ACCENT</text>
  <text x="1308" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1F1A10" opacity=".46">MONO</text>
</svg>
