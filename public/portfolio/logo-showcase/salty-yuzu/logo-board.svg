<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B210B"/>
      <stop offset=".58" stop-color="#20190D"/>
      <stop offset="1" stop-color="#2B210B"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#FFF3CE"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2A900"/>
      <stop offset="1" stop-color="#20A887"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#2B210B"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#F2A900"/><circle cx="1300" cy="790" r="300" stroke="#F2A900"/><path d="M1010 155h440M1010 844h440" stroke="#F2A900"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><circle cx="93" cy="104" r="62" fill="#F2A900"/><circle cx="93" cy="104" r="45" fill="none" stroke="#20190D" stroke-width="7"/><path d="M93 58v92M47 104h92M61 72l65 65M126 72l-65 65" stroke="#20190D" stroke-width="5" stroke-linecap="round"/><circle cx="93" cy="104" r="13" fill="#FFF4E4"/><path d="M148 35l9 22 24 4-18 16 4 24-21-12-21 12 4-24-18-16 24-4Z" fill="#20A887" stroke="#20190D" stroke-width="5" stroke-linejoin="round"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#FFF3CE" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Salty Yuzu</text>
  <text x="575" y="824" text-anchor="middle" fill="#F2A900" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">YUZU SALT DESSERT</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#F2A900" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#FFF3CE" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">yuzu slice + salt crystal</text>
    <text x="0" y="132" fill="#FFF3CE" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#FFF3CE" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#2B210B" stroke="#F2A900"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#20A887"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#F2A900"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#FFF3CE"/>
    <text x="0" y="358" fill="#FFF3CE" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
