  <path d="M570 620h548" stroke="#1F1A10" stroke-width="2" opacity=".12"/>
  <text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#1F1A10" opacity=".45">SCALE TEST</text>
