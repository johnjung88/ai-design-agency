  <text x="440" y="468" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="950" fill="#181223">Promptly AI</text>
  <text x="440" y="482.88" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#181223" opacity=".48">CONVERSATIONAL AI IDENTITY</text>
    <text x="346" y="690" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="3" fill="#181223" opacity=".42">BRAND IDENTITY</text>
    <path d="M346 717h618" stroke="#181223" stroke-width="1.5" opacity=".12"/>
    <text x="964" y="689" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#181223" opacity=".74">AI Tool</text>
    <circle cx="942" cy="424" r="26" fill="#F97316" opacity=".22"/>
  </g>
  
  <g transform="rotate(9 985 400)">
