<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#25143F" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#F97316" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#7C3AED" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2ECFF"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#F97316" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25143F"/>
      <stop offset=".65" stop-color="#181223"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#F2ECFF" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#F2ECFF" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="url(#studioBg)"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".55"/>
  <ellipse cx="790" cy="860" rx="610" ry="76" fill="#000000" opacity=".11"/>
  <circle cx="1320" cy="174" r="214" fill="#7C3AED" opacity=".1"/>
  <circle cx="250" cy="816" r="190" fill="#F97316" opacity=".14"/>
  <text x="96" y="110" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#181223" opacity=".42">BUSINESS CARD MOCKUP</text>
  <text x="96" y="168" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="950" fill="#181223">Promptly AI</text>
  <text x="98" y="214" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="750" fill="#181223" opacity=".55">Conversational AI identity / foil, emboss, print-ready presentation</text>
  
  <g transform="rotate(8 1220 225)">
    <rect x="1030" y="95" width="380" height="250" rx="20" fill="#F2ECFF" filter="url(#contactShadow)"/>
    <rect x="1064" y="129" width="312" height="42" rx="21" fill="#25143F"/>
    <g transform="translate(1074 201) scale(.44)"><g><path d="M17 23h59c9 0 15 6 15 15v20c0 9-6 15-15 15H52L34 87V73H17C8 73 3 67 3 58V38c0-9 5-15 14-15Z" fill="#7C3AED"/><path d="M39 38v28l21-13-10-3 9-12" fill="#F97316" stroke="#181223" stroke-width="4.5" stroke-linejoin="round"/><path d="M71 34l3 8 8 3-8 3-3 8-3-8-8-3 8-3Z" fill="#ffffff"/><path d="M24 32h30" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".42"/></g></g>
    <path d="M1148 223h178M1148 255h130M1148 287h158" stroke="#181223" stroke-width="8" stroke-linecap="round" opacity=".12"/>
  </g>
  
  <g transform="rotate(-8 655 562.5)">
    <rect x="300" y="360" width="710" height="405" rx="22" fill="url(#cardSheen)" filter="url(#ambientShadow)"/>
    <rect x="300" y="360" width="710" height="405" rx="22" fill="#ffffff" opacity=".22"/>
    <rect x="324" y="384" width="662" height="357" rx="14" fill="none" stroke="#181223" stroke-width="1.3" opacity=".1"/>
