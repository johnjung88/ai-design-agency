    <rect x="640" y="205" width="690" height="390" rx="22" fill="#ffffff" opacity=".04"/>
    <rect x="664" y="229" width="642" height="342" rx="14" fill="none" stroke="#ffffff" stroke-width="1.3" opacity=".1"/>
    <g transform="translate(686 263) scale(.62)"><g><path d="M17 23h59c9 0 15 6 15 15v20c0 9-6 15-15 15H52L34 87V73H17C8 73 3 67 3 58V38c0-9 5-15 14-15Z" fill="#7C3AED"/><path d="M39 38v28l21-13-10-3 9-12" fill="#F97316" stroke="#ffffff" stroke-width="4.5" stroke-linejoin="round"/><path d="M71 34l3 8 8 3-8 3-3 8-3-8-8-3 8-3Z" fill="#ffffff"/><path d="M24 32h30" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity=".42"/></g></g>
    
  <text x="780" y="313" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="950" fill="#ffffff">Promptly AI</text>
  <text x="780" y="327.88" text-anchor="start" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="850" letter-spacing="4" fill="#ffffff" opacity=".48">CONVERSATIONAL AI IDENTITY</text>
    <text x="686" y="520" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="850" letter-spacing="3" fill="#ffffff" opacity=".42">BRAND IDENTITY</text>
    <path d="M686 547h598" stroke="#ffffff" stroke-width="1.5" opacity=".12"/>
    <text x="1284" y="519" text-anchor="end" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#ffffff" opacity=".74">AI Tool</text>
    <circle cx="1262" cy="269" r="26" fill="#F97316" opacity=".38"/>
  </g>
  <g transform="rotate(-8 650 540)">
    <rect x="804" y="602" width="142" height="34" rx="17" fill="#7C3AED" opacity=".92"/>
    <rect x="960" y="602" width="80" height="34" rx="17" fill="#F97316" opacity=".92"/>
  </g>
  <text x="1140" y="870" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="4" fill="#181223" opacity=".44">PRINT APPLICATION</text>
