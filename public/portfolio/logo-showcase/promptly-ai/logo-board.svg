<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1D1230"/>
      <stop offset=".58" stop-color="#181223"/>
      <stop offset="1" stop-color="#1D1230"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F2ECFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#1D1230"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#7C3AED"/><circle cx="1300" cy="790" r="300" stroke="#7C3AED"/><path d="M1010 155h440M1010 844h440" stroke="#7C3AED"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><path d="M36 48h118c18 0 30 12 30 30v39c0 18-12 30-30 30h-47l-36 28v-28H36c-18 0-28-12-28-30V78c0-18 10-30 28-30Z" fill="#7C3AED"/><path d="M81 77v56l43-27-21-7 18-24" fill="#F97316" stroke="#181223" stroke-width="9" stroke-linejoin="round"/><path d="M146 68l7 16 16 7-16 7-7 16-7-16-16-7 16-7Z" fill="#FFF4E4"/><path d="M51 66h60" stroke="#FFF4E4" stroke-width="8" stroke-linecap="round" opacity=".4"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#F2ECFF" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Promptly AI</text>
  <text x="575" y="824" text-anchor="middle" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">CONVERSATIONAL AI</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#7C3AED" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#F2ECFF" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">bubble + cursor spark</text>
    <text x="0" y="132" fill="#F2ECFF" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#F2ECFF" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#1D1230" stroke="#7C3AED"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#F97316"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#7C3AED"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#F2ECFF"/>
    <text x="0" y="358" fill="#F2ECFF" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
