<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24150E"/>
      <stop offset=".58" stop-color="#211711"/>
      <stop offset="1" stop-color="#24150E"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F7EFE4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B6532C"/>
      <stop offset="1" stop-color="#D5A64F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#F7EFE4"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#texture)" opacity=".50"/>
  <g opacity=".36"><circle cx="1320" cy="130" r="230" fill="#D5A64F"/><circle cx="230" cy="860" r="210" fill="#B6532C"/></g>
  <text x="115" y="126" fill="#D5A64F" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" letter-spacing="6">BUSINESS CARD SYSTEM</text>
  <text x="115" y="192" fill="#211711" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">Danchae Table</text>
  <text x="115" y="238" fill="#211711" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
  <g transform="translate(380 300) rotate(-7)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="url(#paper)"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#D5A64F" stroke-width="2" opacity=".6"/>
    <g transform="translate(150 155) scale(0.86)"><rect x="36" y="35" width="52" height="52" rx="13" fill="#B6532C"/><rect x="112" y="35" width="52" height="52" rx="13" fill="#D5A64F"/><rect x="36" y="112" width="52" height="52" rx="13" fill="#D5A64F"/><rect x="112" y="112" width="52" height="52" rx="13" fill="#B6532C"/><path d="M57 150c25-36 61-36 86 0" fill="none" stroke="#211711" stroke-width="10" stroke-linecap="round"/><path d="M53 59h111M36 88h128M36 112h128M53 164h111" stroke="#FFF4E4" stroke-width="4" opacity=".56"/></g>
    <text x="345" y="246" text-anchor="start" fill="#211711" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">Danchae Table</text>
  <text x="345" y="270.96" text-anchor="start" fill="#211711" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">KOREAN DINING</text>
    <path d="M347 342h280" stroke="#B6532C" stroke-width="3"/>
