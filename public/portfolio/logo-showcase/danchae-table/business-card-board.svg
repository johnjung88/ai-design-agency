    <g transform="translate(635 185) scale(0.82)"><rect x="36" y="35" width="52" height="52" rx="13" fill="#B6532C"/><rect x="112" y="35" width="52" height="52" rx="13" fill="#D5A64F"/><rect x="36" y="112" width="52" height="52" rx="13" fill="#D5A64F"/><rect x="112" y="112" width="52" height="52" rx="13" fill="#B6532C"/><path d="M57 150c25-36 61-36 86 0" fill="none" stroke="#24150E" stroke-width="10" stroke-linecap="round"/><path d="M53 59h111M36 88h128M36 112h128M53 164h111" stroke="#F7EFE4" stroke-width="4" opacity=".56"/></g>
