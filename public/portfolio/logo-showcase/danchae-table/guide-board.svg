  <g transform="translate(815 420) scale(.72)"><g><rect x="17" y="18" width="29" height="29" rx="8" fill="#A84A2A"/><rect x="54" y="18" width="29" height="29" rx="8" fill="#D4A64D"/><rect x="17" y="55" width="29" height="29" rx="8" fill="#D4A64D"/><rect x="54" y="55" width="29" height="29" rx="8" fill="#A84A2A"/><path d="M30 72c13-18 27-18 40 0" fill="none" stroke="#1E1712" stroke-width="6" stroke-linecap="round"/><path d="M27 30h56M17 47h66M17 55h66M27 84h56" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <g transform="translate(985 448) scale(.45)"><g><rect x="17" y="18" width="29" height="29" rx="8" fill="#A84A2A"/><rect x="54" y="18" width="29" height="29" rx="8" fill="#D4A64D"/><rect x="17" y="55" width="29" height="29" rx="8" fill="#D4A64D"/><rect x="54" y="55" width="29" height="29" rx="8" fill="#A84A2A"/><path d="M30 72c13-18 27-18 40 0" fill="none" stroke="#1E1712" stroke-width="6" stroke-linecap="round"/><path d="M27 30h56M17 47h66M17 55h66M27 84h56" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <path d="M570 620h548" stroke="#1E1712" stroke-width="2" opacity=".12"/>
  <text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#1E1712" opacity=".45">SCALE TEST</text>
  <rect x="1190" y="380" width="120" height="120" rx="26" fill="#A84A2A"/>
  <rect x="1340" y="380" width="120" height="120" rx="26" fill="#D4A64D"/>
  <rect x="1190" y="535" width="120" height="120" rx="26" fill="#1E1712"/>
  <rect x="1340" y="535" width="120" height="120" rx="26" fill="#F6EFE5" stroke="#1E1712" stroke-width="2" opacity=".9"/>
  <text x="1190" y="710" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#1E1712" opacity=".45">PALETTE</text>
</svg>
