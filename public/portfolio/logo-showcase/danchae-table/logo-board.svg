<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#24150E"/>
      <stop offset=".58" stop-color="#211711"/>
      <stop offset="1" stop-color="#24150E"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F7EFE4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B6532C"/>
      <stop offset="1" stop-color="#D5A64F"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#24150E"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#B6532C"/><circle cx="1300" cy="790" r="300" stroke="#B6532C"/><path d="M1010 155h440M1010 844h440" stroke="#B6532C"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><rect x="36" y="35" width="52" height="52" rx="13" fill="#B6532C"/><rect x="112" y="35" width="52" height="52" rx="13" fill="#D5A64F"/><rect x="36" y="112" width="52" height="52" rx="13" fill="#D5A64F"/><rect x="112" y="112" width="52" height="52" rx="13" fill="#B6532C"/><path d="M57 150c25-36 61-36 86 0" fill="none" stroke="#211711" stroke-width="10" stroke-linecap="round"/><path d="M53 59h111M36 88h128M36 112h128M53 164h111" stroke="#FFF4E4" stroke-width="4" opacity=".56"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#F7EFE4" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Danchae Table</text>
  <text x="575" y="824" text-anchor="middle" fill="#B6532C" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">KOREAN DINING</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#B6532C" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#F7EFE4" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">bansang grid + table curve</text>
    <text x="0" y="132" fill="#F7EFE4" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#F7EFE4" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#24150E" stroke="#B6532C"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#D5A64F"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#B6532C"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#F7EFE4"/>
    <text x="0" y="358" fill="#F7EFE4" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
