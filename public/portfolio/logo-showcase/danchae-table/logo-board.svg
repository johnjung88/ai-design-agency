  <g transform="translate(1158 688) scale(1)"><g><rect x="17" y="18" width="29" height="29" rx="8" fill="#ffffff"/><rect x="54" y="18" width="29" height="29" rx="8" fill="#ffffff"/><rect x="17" y="55" width="29" height="29" rx="8" fill="#ffffff"/><rect x="54" y="55" width="29" height="29" rx="8" fill="#ffffff"/><path d="M30 72c13-18 27-18 40 0" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/><path d="M27 30h56M17 47h66M17 55h66M27 84h56" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <g transform="translate(1326 688) scale(1)"><g><rect x="17" y="18" width="29" height="29" rx="8" fill="#ffffff"/><rect x="54" y="18" width="29" height="29" rx="8" fill="#ffffff"/><rect x="17" y="55" width="29" height="29" rx="8" fill="#ffffff"/><rect x="54" y="55" width="29" height="29" rx="8" fill="#ffffff"/><path d="M30 72c13-18 27-18 40 0" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/><path d="M27 30h56M17 47h66M17 55h66M27 84h56" stroke="#ffffff" stroke-width="3" opacity=".55"/></g></g>
  <text x="972" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1E1712" opacity=".46">PRIMARY</text>
  <text x="1140" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1E1712" opacity=".46">ACCENT</text>
  <text x="1308" y="858" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3" fill="#1E1712" opacity=".46">MONO</text>
</svg>
