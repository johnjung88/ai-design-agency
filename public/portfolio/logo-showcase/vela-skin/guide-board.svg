  <g transform="translate(590 392) scale(1.1)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#FFF4E4"/><path d="M68 158h64" stroke="#15212B" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g><g transform="translate(815 420) scale(0.72)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#FFF4E4"/><path d="M68 158h64" stroke="#15212B" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g><g transform="translate(985 448) scale(0.45)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#FFF4E4"/><path d="M68 158h64" stroke="#15212B" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g><path d="M570 620h548" stroke="#15212B" stroke-width="2" opacity=".12"/><text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#15212B" opacity=".45">SCALE TEST</text>
