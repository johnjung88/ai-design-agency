<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img">
  
  <defs>
    <filter id="ambientShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="34" stdDeviation="30" flood-color="#1C2A36" flood-opacity=".24"/>
    </filter>
    <filter id="contactShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="11" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <filter id="pressedInk" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.4" stdDeviation=".6" flood-color="#ffffff" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="2.2" stdDeviation="1.8" flood-color="#000000" flood-opacity=".16"/>
    </filter>
    <filter id="neonGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#D9C6AD" flood-opacity=".45"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#71879D" flood-opacity=".28"/>
    </filter>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".92" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <linearGradient id="studioBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3F2ED"/>
      <stop offset=".52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#D9C6AD" stop-opacity=".52"/>
    </linearGradient>
    <linearGradient id="darkPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1C2A36"/>
      <stop offset=".65" stop-color="#17212B"/>
      <stop offset="1" stop-color="#71879D"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".96"/>
      <stop offset=".48" stop-color="#F3F2ED" stop-opacity=".92"/>
      <stop offset=".51" stop-color="#ffffff" stop-opacity=".45"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".86"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".35" stop-color="#F3F2ED" stop-opacity=".22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".06"/>
    </linearGradient>
  </defs>
  
  <rect width="1600" height="1000" fill="#F3F2ED"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#paperNoise)" opacity=".42"/>
  <rect x="78" y="72" width="1444" height="856" rx="38" fill="#ffffff" filter="url(#ambientShadow)"/>
  <text x="132" y="150" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#71879D">BRAND GUIDE</text>
  <text x="132" y="220" font-family="Inter, Arial, sans-serif" font-size="50" font-weight="950" fill="#17212B">Vela Skin</text>
  <text x="132" y="268" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="750" fill="#17212B" opacity=".58">Clean science identity / clearspace, scale, and palette rules</text>
  <g transform="translate(180 390) scale(1.8)"><g><path d="M20 24 50 80 80 24" fill="none" stroke="#71879D" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="37" r="9" fill="#D9C6AD"/><circle cx="50" cy="37" r="3" fill="#ffffff"/><path d="M34 78h32" stroke="#17212B" stroke-width="5" stroke-linecap="round"/><path d="M33 25c11-8 23-8 34 0" fill="none" stroke="#D9C6AD" stroke-width="5" stroke-linecap="round"/></g></g>
  <path d="M150 360h260v260H150Z" fill="none" stroke="#71879D" stroke-width="3" stroke-dasharray="10 12" opacity=".45"/>
  <path d="M180 390h200v200H180Z" fill="none" stroke="#17212B" stroke-width="2" opacity=".12"/>
  <text x="150" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#17212B" opacity=".45">CLEARSPACE</text>
  <g transform="translate(590 392) scale(1.1)"><g><path d="M20 24 50 80 80 24" fill="none" stroke="#71879D" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="37" r="9" fill="#D9C6AD"/><circle cx="50" cy="37" r="3" fill="#ffffff"/><path d="M34 78h32" stroke="#17212B" stroke-width="5" stroke-linecap="round"/><path d="M33 25c11-8 23-8 34 0" fill="none" stroke="#D9C6AD" stroke-width="5" stroke-linecap="round"/></g></g>
  <g transform="translate(815 420) scale(.72)"><g><path d="M20 24 50 80 80 24" fill="none" stroke="#71879D" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="37" r="9" fill="#D9C6AD"/><circle cx="50" cy="37" r="3" fill="#ffffff"/><path d="M34 78h32" stroke="#17212B" stroke-width="5" stroke-linecap="round"/><path d="M33 25c11-8 23-8 34 0" fill="none" stroke="#D9C6AD" stroke-width="5" stroke-linecap="round"/></g></g>
  <g transform="translate(985 448) scale(.45)"><g><path d="M20 24 50 80 80 24" fill="none" stroke="#71879D" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/><circle cx="50" cy="37" r="9" fill="#D9C6AD"/><circle cx="50" cy="37" r="3" fill="#ffffff"/><path d="M34 78h32" stroke="#17212B" stroke-width="5" stroke-linecap="round"/><path d="M33 25c11-8 23-8 34 0" fill="none" stroke="#D9C6AD" stroke-width="5" stroke-linecap="round"/></g></g>
  <path d="M570 620h548" stroke="#17212B" stroke-width="2" opacity=".12"/>
  <text x="570" y="682" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#17212B" opacity=".45">SCALE TEST</text>
  <rect x="1190" y="380" width="120" height="120" rx="26" fill="#71879D"/>
  <rect x="1340" y="380" width="120" height="120" rx="26" fill="#D9C6AD"/>
  <rect x="1190" y="535" width="120" height="120" rx="26" fill="#17212B"/>
  <rect x="1340" y="535" width="120" height="120" rx="26" fill="#F3F2ED" stroke="#17212B" stroke-width="2" opacity=".9"/>
  <text x="1190" y="710" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3" fill="#17212B" opacity=".45">PALETTE</text>
</svg>
