<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111B23"/>
      <stop offset=".58" stop-color="#15212B"/>
      <stop offset="1" stop-color="#111B23"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F2F1EC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#71879D"/>
      <stop offset="1" stop-color="#D7C1A4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#F4F1EC"/>
  <rect x="82" y="92" width="686" height="816" rx="36" fill="#111B23" filter="url(#shadow)"/>
  <rect x="832" y="92" width="686" height="816" rx="36" fill="#ffffff" filter="url(#shadow)"/>
  <text x="132" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#ffffff" opacity=".48">REVERSE</text>
  <g transform="translate(275 245) scale(1.88)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#F2F1EC"/><path d="M68 158h64" stroke="#111B23" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g>
  <text x="425" y="690" text-anchor="middle" fill="#ffffff" font-family="Inter, Montserrat, Arial, sans-serif" font-size="46" font-weight="860" letter-spacing="-1">Vela Skin</text>
  <text x="425" y="712.08" text-anchor="middle" fill="#ffffff" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">CLINICAL GLOW</text>
  <text x="425" y="815" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="5" fill="#ffffff" opacity=".42">DARK BACKGROUND</text>
  <text x="882" y="166" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="950" letter-spacing="6" fill="#15212B" opacity=".42">MONO</text>
  <g transform="translate(1025 245) scale(1.88)"><path d="M40 48 100 158 160 48" fill="none" stroke="#15212B" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#15212B"/><circle cx="100" cy="75" r="6" fill="#FFF4E4"/><path d="M68 158h64" stroke="#15212B" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#15212B" stroke-width="8" stroke-linecap="round"/></g>
  <text x="1175" y="690" text-anchor="middle" fill="#15212B" font-family="Inter, Montserrat, Arial, sans-serif" font-size="46" font-weight="860" letter-spacing="-1">Vela Skin</text>
  <text x="1175" y="712.08" text-anchor="middle" fill="#15212B" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">CLINICAL GLOW</text>
  <text x="1175" y="815" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" letter-spacing="5" fill="#15212B" opacity=".42">ONE-COLOR VERSION</text>
</svg>
