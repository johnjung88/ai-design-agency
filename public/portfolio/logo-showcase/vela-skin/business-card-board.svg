<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111B23"/>
      <stop offset=".58" stop-color="#15212B"/>
      <stop offset="1" stop-color="#111B23"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F2F1EC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#71879D"/>
      <stop offset="1" stop-color="#D7C1A4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#F2F1EC"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#texture)" opacity=".50"/>
  <g opacity=".36"><circle cx="1320" cy="130" r="230" fill="#D7C1A4"/><circle cx="230" cy="860" r="210" fill="#71879D"/></g>
  <text x="115" y="126" fill="#D7C1A4" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" letter-spacing="6">BUSINESS CARD SYSTEM</text>
  <text x="115" y="192" fill="#15212B" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">Vela Skin</text>
  <text x="115" y="238" fill="#15212B" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
  <g transform="translate(380 300) rotate(-7)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="url(#paper)"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#D7C1A4" stroke-width="2" opacity=".6"/>
    <g transform="translate(150 155) scale(0.86)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#FFF4E4"/><path d="M68 158h64" stroke="#15212B" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g>
    <text x="345" y="246" text-anchor="start" fill="#15212B" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">Vela Skin</text>
  <text x="345" y="270.96" text-anchor="start" fill="#15212B" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">CLINICAL GLOW</text>
    <path d="M347 342h280" stroke="#71879D" stroke-width="3"/>
  </g>
  <g transform="translate(705 535) rotate(8)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="#111B23"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#71879D" stroke-width="2" opacity=".28"/>
    <g transform="translate(635 185) scale(0.82)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#F2F1EC"/><path d="M68 158h64" stroke="#111B23" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g>
    <text x="90" y="154" fill="#F2F1EC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="850">Vela Skin</text>
    <text x="92" y="202" fill="#71879D" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" letter-spacing="5">CLINICAL GLOW</text>
    <path d="M92 292h278" stroke="#D7C1A4" stroke-width="2" opacity=".56"/>
    <text x="92" y="342" fill="#F2F1EC" opacity=".62" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="540">velaskin.kr</text>
    <text x="92" y="380" fill="#F2F1EC" opacity=".62" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="540">@vela.skin</text>
  </g>
</svg>
