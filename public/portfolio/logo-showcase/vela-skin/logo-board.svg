<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111B23"/>
      <stop offset=".58" stop-color="#15212B"/>
      <stop offset="1" stop-color="#111B23"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F2F1EC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#71879D"/>
      <stop offset="1" stop-color="#D7C1A4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#111B23"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#71879D"/><circle cx="1300" cy="790" r="300" stroke="#71879D"/><path d="M1010 155h440M1010 844h440" stroke="#71879D"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><path d="M40 48 100 158 160 48" fill="none" stroke="#71879D" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/><circle cx="100" cy="75" r="18" fill="#D7C1A4"/><circle cx="100" cy="75" r="6" fill="#FFF4E4"/><path d="M68 158h64" stroke="#15212B" stroke-width="9" stroke-linecap="round"/><path d="M66 48c23-17 45-17 68 0" fill="none" stroke="#D7C1A4" stroke-width="8" stroke-linecap="round"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#F2F1EC" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Vela Skin</text>
  <text x="575" y="824" text-anchor="middle" fill="#71879D" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">CLINICAL GLOW</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#71879D" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#F2F1EC" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">V line + light point</text>
    <text x="0" y="132" fill="#F2F1EC" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#F2F1EC" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#111B23" stroke="#71879D"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#D7C1A4"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#71879D"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#F2F1EC"/>
    <text x="0" y="358" fill="#F2F1EC" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
