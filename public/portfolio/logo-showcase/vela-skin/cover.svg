  <text x="92" y="178" fill="#F2F1EC" font-family="Inter, Arial, sans-serif" font-size="52" font-weight="860">Clean Science Skincare</text>
  <text x="92" y="222" fill="#F2F1EC" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="560">V line + light point / logo, business card, brand kit</text>
