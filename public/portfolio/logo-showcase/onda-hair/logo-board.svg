<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#241614"/>
      <stop offset=".58" stop-color="#201513"/>
      <stop offset="1" stop-color="#241614"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F8ECE7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9A6759"/>
      <stop offset="1" stop-color="#E7BFB1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#241614"/>
  <g opacity=".12"><circle cx="1250" cy="210" r="168" stroke="#9A6759"/><circle cx="1300" cy="790" r="300" stroke="#9A6759"/><path d="M1010 155h440M1010 844h440" stroke="#9A6759"/></g>
  <g filter="url(#shadow)"><g transform="translate(335 215) scale(2.4)"><circle cx="100" cy="100" r="73" fill="none" stroke="#9A6759" stroke-width="19"/><path d="M35 103c23-37 49-41 78-8 21 24 39 23 61-5" fill="none" stroke="#201513" stroke-width="13" stroke-linecap="round"/><path d="M52 134c28 21 70 21 98 0" fill="none" stroke="#E7BFB1" stroke-width="13" stroke-linecap="round"/><path d="M62 67c24-17 55-18 79-2" fill="none" stroke="#E7BFB1" stroke-width="8" stroke-linecap="round" opacity=".9"/></g></g>
  <text x="575" y="754" text-anchor="middle" fill="#F8ECE7" font-family="Inter, Arial, sans-serif" font-size="106" font-weight="860" letter-spacing="-2">Onda Hair</text>
  <text x="575" y="824" text-anchor="middle" fill="#9A6759" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800" letter-spacing="12">HAIR STUDIO</text>
  <g transform="translate(1040 330)">
    <text x="0" y="0" fill="#9A6759" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="850" letter-spacing="4">DESIGN LOGIC</text>
    <text x="0" y="76" fill="#F8ECE7" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">wave + hair texture</text>
    <text x="0" y="132" fill="#F8ECE7" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">A compact mark designed for signs,</text>
    <text x="0" y="169" fill="#F8ECE7" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="500">cards, stickers, profiles and packages.</text>
    <rect x="0" y="244" width="72" height="72" rx="36" fill="#241614" stroke="#9A6759"/>
    <rect x="96" y="244" width="72" height="72" rx="36" fill="#E7BFB1"/>
    <rect x="192" y="244" width="72" height="72" rx="36" fill="#9A6759"/>
    <rect x="288" y="244" width="72" height="72" rx="36" fill="#F8ECE7"/>
    <text x="0" y="358" fill="#F8ECE7" opacity=".52" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="3">BRAND SYSTEM / VECTOR MASTER</text>
  </g>
</svg>
