<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#241614"/>
      <stop offset=".58" stop-color="#201513"/>
      <stop offset="1" stop-color="#241614"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fffaf0"/>
      <stop offset="1" stop-color="#F8ECE7"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#9A6759"/>
      <stop offset="1" stop-color="#E7BFB1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="34" stdDeviation="26" flood-color="#000000" flood-opacity=".34"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".20"/>
    </filter>
    <filter id="texture" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .045"/></feComponentTransfer>
    </filter>
  </defs>
  
  <rect width="1600" height="1000" fill="#F8ECE7"/>
  <rect width="1600" height="1000" fill="#ffffff" filter="url(#texture)" opacity=".50"/>
  <g opacity=".36"><circle cx="1320" cy="130" r="230" fill="#E7BFB1"/><circle cx="230" cy="860" r="210" fill="#9A6759"/></g>
  <text x="115" y="126" fill="#E7BFB1" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" letter-spacing="6">BUSINESS CARD SYSTEM</text>
  <text x="115" y="192" fill="#201513" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="860">Onda Hair</text>
  <text x="115" y="238" fill="#201513" opacity=".58" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="540">front / back layout for logo and business card sales portfolio</text>
  <g transform="translate(380 300) rotate(-7)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="url(#paper)"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#E7BFB1" stroke-width="2" opacity=".6"/>
    <g transform="translate(150 155) scale(0.86)"><circle cx="100" cy="100" r="73" fill="none" stroke="#9A6759" stroke-width="19"/><path d="M35 103c23-37 49-41 78-8 21 24 39 23 61-5" fill="none" stroke="#201513" stroke-width="13" stroke-linecap="round"/><path d="M52 134c28 21 70 21 98 0" fill="none" stroke="#E7BFB1" stroke-width="13" stroke-linecap="round"/><path d="M62 67c24-17 55-18 79-2" fill="none" stroke="#E7BFB1" stroke-width="8" stroke-linecap="round" opacity=".9"/></g>
    <text x="345" y="246" text-anchor="start" fill="#201513" font-family="Inter, Montserrat, Arial, sans-serif" font-size="52" font-weight="860" letter-spacing="-1">Onda Hair</text>
  <text x="345" y="270.96" text-anchor="start" fill="#201513" opacity=".58" font-family="Inter, Montserrat, Arial, sans-serif" font-size="11" font-weight="820" letter-spacing="4">HAIR STUDIO</text>
    <path d="M347 342h280" stroke="#9A6759" stroke-width="3"/>
  </g>
  <g transform="translate(705 535) rotate(8)" filter="url(#shadow)">
    <rect width="840" height="486" rx="26" fill="#241614"/>
    <rect x="40" y="40" width="760" height="406" rx="14" stroke="#9A6759" stroke-width="2" opacity=".28"/>
